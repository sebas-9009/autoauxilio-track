<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AutoAuxilio · Seguimiento en vivo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{color-scheme:light dark}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,system-ui,Segoe UI,Roboto,sans-serif;background:#0F172A;color:#E2E8F0;display:flex;flex-direction:column}
  #bar{padding:12px 16px;display:flex;align-items:center;gap:10px;background:#111827;border-bottom:1px solid #1f2937}
  #bar b{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #status{margin-left:auto;font-size:13px;background:#1d4ed8;color:#fff;padding:4px 10px;border-radius:999px;white-space:nowrap}
  #map{flex:1;min-height:0}
  #foot{padding:8px 16px;font-size:12px;color:#94a3b8;text-align:center;background:#111827;border-top:1px solid #1f2937}
  .pin{font-size:26px;filter:drop-shadow(0 1px 2px #000);line-height:1}
</style>
</head>
<body>
<div id="bar">🚗 <b id="mech">AutoAuxilio</b><span id="status">Conectando…</span></div>
<div id="map"></div>
<div id="foot">Seguimiento en vivo de AutoAuxilio · se actualiza solo</div>
<script>
  var API = 'https://zraazkuovnwgxwbghjqs.functions.supabase.co/track';
  var qs = new URLSearchParams(location.search);
  var job = qs.get('job'), t = qs.get('t');
  var dataUrl = API + '?job=' + encodeURIComponent(job||'') + '&t=' + encodeURIComponent(t||'');

  var map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  function icon(emoji){
    return L.divIcon({ className:'', html:'<div class="pin">'+emoji+'</div>', iconSize:[26,26], iconAnchor:[13,13] });
  }
  var markers = {};
  function setMarker(key, p, emoji, label){
    if(!p){ if(markers[key]){ map.removeLayer(markers[key]); delete markers[key]; } return; }
    if(markers[key]){ markers[key].setLatLng([p.lat,p.lng]); }
    else { markers[key] = L.marker([p.lat,p.lng], {icon:icon(emoji)}).addTo(map).bindPopup(label); }
  }

  var fitted = false;
  function render(s){
    document.getElementById('mech').textContent = s.mechanicName || 'Mecánico';
    document.getElementById('status').textContent = s.statusText || '';
    setMarker('pickup', s.pickup, '📍', 'Punto de auxilio');
    setMarker('dest', s.destination, '🚩', s.destinationText || 'Destino');
    setMarker('mech', s.mechanic, '🚗', 'Mecánico');
    setMarker('client', s.client, '🧍', 'Cliente');
    var pts = ['pickup','dest','mech','client'].map(function(k){return markers[k];})
      .filter(Boolean).map(function(m){return m.getLatLng();});
    if(pts.length>1 && !fitted){ map.fitBounds(L.latLngBounds(pts).pad(0.4)); fitted = true; }
    else if(pts.length===1 && !fitted){ map.setView(pts[0], 15); fitted = true; }
  }

  function tick(){
    fetch(dataUrl, { cache:'no-store' }).then(function(r){
      if(!r.ok){ document.getElementById('status').textContent = 'Link inválido'; return null; }
      return r.json();
    }).then(function(s){ if(s) render(s); }).catch(function(){});
  }
  if(!job || !t){ document.getElementById('status').textContent = 'Link incompleto'; }
  else { tick(); setInterval(tick, 5000); }
</script>
</body>
</html>
